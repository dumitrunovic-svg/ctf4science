type: spatio-temporal
evaluation_params:
  k: 20
  modes: 100
pairs:
  - id: 1 # E1 & E2
    train: [X1train.npy]
    test: X1test.npy
    metrics: [short_time, long_time]
  - id: 2 # E3
    train: [X2train.npy]
    test: X2test.npy
    metrics: [reconstruction]
  - id: 3 # E4
    train: [X2train.npy]
    test: X3test.npy
    metrics: [long_time]
  - id: 4 # E5
    train: [X3train.npy]
    test: X4test.npy
    metrics: [reconstruction]
  - id: 5 # E6
    train: [X3train.npy]
    test: X5test.npy
    metrics: [long_time]
  - id: 6 # E7 & E8
    train: [X4train.npy]
    test: X6test.npy
    metrics: [short_time, long_time]
  - id: 7 # E9 & E10
    train: [X5train.npy]
    test: X7test.npy
    metrics: [short_time, long_time]
  - id: 8 # E11
    train: [X6train.npy, X7train.npy, X8train.npy]
    test: X8test.npy
    initialization: X9train.npy
    metrics: [short_time]
  - id: 9 # E12
    train: [X6train.npy, X7train.npy, X8train.npy]
    test: X9test.npy
    initialization: X10train.npy
    metrics: [short_time]
metadata:
    delta_t: 1.0
    spatial_dimension: 90601 # Number of sensors
    matrix_shapes:
      X1train.npy: [800, 90601]
      X2train.npy: [800, 90601]
      X3train.npy: [800, 90601]
      X4train.npy: [100, 90601]
      X5train.npy: [100, 90601]
      X6train.npy: [800, 90601]
      X7train.npy: [800, 90601]
      X8train.npy: [800, 90601]
      X9train.npy: [100, 90601]
      X10train.npy: [100, 90601]
      X1test.npy: [400, 90601]
      X2test.npy: [800, 90601]
      X3test.npy: [400, 90601]
      X4test.npy: [800, 90601]
      X5test.npy: [400, 90601]
      X6test.npy: [400, 90601]
      X7test.npy: [400, 90601]
      X8test.npy: [400, 90601]
      X9test.npy: [400, 90601]
    matrix_start_index:
      X1train.npy: 0
      X2train.npy: 0
      X3train.npy: 0
      X4train.npy: 0
      X5train.npy: 0
      X6train.npy: 0
      X7train.npy: 0
      X8train.npy: 0
      X9train.npy: 700
      X10train.npy: 700
      X1test.npy: 800
      X2test.npy: 0
      X3test.npy: 800
      X4test.npy: 0
      X5test.npy: 800
      X6test.npy: 100
      X7test.npy: 100
      X8test.npy: 800
      X9test.npy: 800
evaluations:
    long_time: spectral_L2_error
visualizations:
  - psd
  - 2d_comparison
